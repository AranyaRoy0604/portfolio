name: Deploy Portfolio

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # Updated from v3 to v4
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        # Updated from v3 to v4
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
